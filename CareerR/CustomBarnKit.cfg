// ============================================================
// CAREER REIMAGINED - BUILDING LIMITS
// Requires Custom Barn Kit by Sarbian.
//
// Uses @ patch syntax so Custom Barn Kit's stock defaults for
// any field we don't override are preserved. Defining a bare
// CUSTOMBARNKIT block instead of patching will zero out
// unspecified buildings and break CommNet.
//
// Each block sets:
//   - @levels = 6 (six building tiers: 1 free starting tier + 5 paid upgrades)
//   - @upgradesVisual = 1, 2, 2, 2, 3, 3 (visual styles, 2 per visual)
//   - @upgrades = per-tier fund values; Plus building-specific gameplay fields
//
// ARRAY INDEXING (important - verified in-game):
//   All per-tier arrays have 6 entries, index [0]..[5], where [0] is the
//   FREE STARTING TIER the player already owns at career start. So:
//     - @partCountLimit[0], @craftMassLimit[0], etc. = the STARTING building's stats
//     - @upgrades[0] is NEVER CHARGED (it nominally "costs" the free tier);
//       its value is inert. The FIRST upgrade the player actually pays for is
//       @upgrades[1] (the second number). Entries [1]..[5] are the 5 real costs.
//   Do not be misled by @upgrades[0]: e.g. "40000, 50000, ..." means the first
//   purchasable upgrade costs 50000, not 40000.
//
// Block names match Custom Barn Kit's default.cfg (uppercase).
// Field names verified against:
//   https://github.com/sarbian/CustomBarnKit/blob/master/CustomBarnKit/default.cfg
//
// CAVEAT: Custom Barn Kit may require every per-level field to
// have an array length matching @levels. If we override @levels = 6
// but a stock field still has 3 entries, CBK may error. We override
// the most commonly-checked per-level fields explicitly. Less common
// fields might need padding during testing if CBK errors.
// ============================================================

@CUSTOMBARNKIT:FINAL
{
    // ============
    // VAB - Vehicle Assembly Building
    // Tighter early part count limits with gradual ramp to stock max.
    // ============
    @VAB
    {
        @levels = 6
        @upgradesVisual = 1, 2, 2, 2, 3, 3
        @upgrades = 40000, 50000, 110000, 240000, 450000, 850000
        @partCountLimit = 10, 25, 40, 70, 120, 255
    }

    // ============
    // SPH - Spaceplane Hangar
    // Starts higher than VAB - planes need more parts even for basic builds.
    // ============
    @SPH
    {
        @levels = 6
        @upgradesVisual = 1, 2, 2, 2, 3, 3
        @upgrades = 40000, 55000, 130000, 240000, 450000, 850000
        @partCountLimit = 20, 30, 50, 80, 130, 255
    }

    // ============
    // LAUNCHPAD
    // Mass and size scale toward unlimited at level 6.
    // craftSizeLimit uses a sub-block of size = X, Y, Z entries.
    // ============
    @LAUNCHPAD
    {
        @levels = 6
        @upgradesVisual = 1, 2, 2, 2, 3, 3
        @upgrades = 40000, 55000, 130000, 240000, 450000, 850000
        @craftMassLimit = 18, 35, 70, 150, 300, -1
        !craftSizeLimit {}
        craftSizeLimit
        {
            size = 30, 20, 30
            size = 40, 30, 40
            size = 50, 50, 50
            size = 60, 80, 60
            size = 80, 100, 80
            size = -1, -1, -1
        }
    }

    // ============
    // RUNWAY
    // Same progression as LAUNCHPAD.
    // ============
    @RUNWAY
    {
        @levels = 6
        @upgradesVisual = 1, 2, 2, 2, 3, 3
        @upgrades = 40000, 55000, 130000, 240000, 450000, 850000
        @craftMassLimit = 18, 35, 70, 150, 300, -1
        !craftSizeLimit {}
        craftSizeLimit
        {
            size = 30, 20, 30
            size = 40, 30, 40
            size = 50, 50, 50
            size = 60, 80, 60
            size = 80, 100, 80
            size = -1, -1, -1
        }
    }

    // ============
    // TRACKING - Tracking Station
    // orbitDisplayMode: 0=none, 1=body orbits, 2=all orbits, 3=patched conics
    // patchesAheadLimit: how many maneuver patches you can plan ahead
    // ============
    @TRACKING
    {
        @levels = 6
        @upgradesVisual = 1, 2, 2, 2, 3, 3
        @upgrades = 50000, 80000, 200000, 340000, 620000, 1250000
        @orbitDisplayMode = 3, 3, 3, 3, 3, 3
        @patchesAheadLimit = 1, 2, 4, 6, 8, 10
        @DSNRange = 2000000000, 10000000000, 50000000000, 125000000000, 250000000000, 1000000000000
    }

    // ============
    // MISSION - Mission Control
    // Active contract slots scale with level. CBK's default config
    // does not expose a "number offered" field, only "active limit".
    // partRecoveryValueFactor = 0 disables fund refunds from craft
    // recovery. Funds in this mod are for building upgrades only.
    // ============
    @MISSION
    {
        @levels = 6
        @upgradesVisual = 1, 2, 2, 2, 3, 3
        @upgrades = 45000, 70000, 160000, 290000, 530000, 1050000
        @activeContractsLimit = 1, 2, 4, 7, 12, -1
        @partRecoveryValueFactor = 0
        @resourceRecoveryValueFactor = 0
    }

    // ============
    // RESEARCH - R&D
    // scienceCostLimit gates the maximum tech tree node science cost
    // the player can unlock at this R&D level.
    // dataToScienceRatio is the conversion when transmitting partial science.
    // unlockedFuelTransfer is the level at which fuel transfer unlocks.
    // ============
    @RESEARCH
    {
        // R&D uses 3 LEVELS (not 6 like other buildings). This is the REAL
        // fix for the surface-sample gate. KSP hardcodes surface samples to
        // R&D facility *level 2 of the max* - it checks the normalized level
        // fraction, NOT the visual model. On a 6-level R&D, that ~0.5
        // fraction landed at level 3-4 (the "level 4" problem). With 3
        // levels (matching stock), the gate falls at level 2 = the FIRST
        // paid upgrade, exactly as the README promises. upgradesVisual is
        // purely the 3D model and does NOT affect the gate (an earlier
        // 1,3,3,3,3,3 attempt did nothing - reverted).
        //
        // Array indexing (as elsewhere): [0] = free starting tier (cost
        // inert), [1] = first paid upgrade (LEVEL 2 -> surface samples),
        // [2] = top level. scienceCostLimit -1 at top = unlimited, covering
        // the tree's most expensive node (800).
        @levels = 3
        @upgradesVisual = 1, 2, 3
        @upgrades = 40000, 100000, 2500000
        @scienceCostLimit = 100, 500, -1
        @dataToScienceRatio = 0.4, 0.7, 1.0
        @unlockedFuelTransfer = 2
    }

    // ============
    // ASTRONAUTS - Astronaut Complex
    // activeCrewLimit: max kerbals you can have employed
    // crewLevelLimit: max experience level a kerbal can reach
    // ============
    @ASTRONAUTS
    {
        // 3 LEVELS (like R&D, not 6). The surface-sample gate checks BOTH
        // R&D and Astronaut Complex at "level 2 of max" via KSP's normalized
        // fraction. With 3 levels, that gate falls at level 2 = the first
        // paid upgrade, matching R&D and the README ("both at level 2").
        // EVA-related unlocks below use explicit CBK level fields, so they
        // also resolve to the first upgrade.
        // Array indexing: [0] = free starting tier, [1] = first paid upgrade
        // (LEVEL 2 -> EVA + surface samples), [2] = top.
        @levels = 3
        @upgradesVisual = 1, 2, 3
        @upgrades = 40000, 100000, 850000
        @activeCrewLimit = 3, 8, -1
        @crewLevelLimit = 2, 4, -1
        // EVA off Kerbin, flag planting, clambering, and EVA parachute all available at L2 (the first upgrade)
        @unlockedEVA = 2
        @unlockedEVAFlags = 2
        @unlockedEVAClamber = 2
        @unlockedEVAChute = 2
    }

    // ADMINISTRATION not modified - strategies are disabled in this mod.
    // It uses stock defaults (3 levels).
}