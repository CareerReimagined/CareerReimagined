// ============================================================
// CAREER REIMAGINED - BUILDING LIMITS
// Requires Custom Barn Kit by Sarbian.
//
// Uses @ patch syntax so Custom Barn Kit's stock defaults for
// any field we don't override are preserved. Defining a bare
// CUSTOMBARNKIT block instead of patching will zero out
// unspecified buildings and break CommNet.
//
// Each block sets:
//   - @levels = 6 (six upgrade tiers)
//   - @upgradesVisual = 1, 1, 2, 2, 3, 3 (visual styles, 2 per visual)
//   - @upgrades = fund cost to upgrade to each level
//   - Plus building-specific gameplay fields
//
// Block names match Custom Barn Kit's default.cfg (uppercase).
// Field names verified against:
//   https://github.com/sarbian/CustomBarnKit/blob/master/CustomBarnKit/default.cfg
//
// CAVEAT: Custom Barn Kit may require every per-level field to
// have an array length matching @levels. If we override @levels = 6
// but a stock field still has 3 entries, CBK may error. We override
// the most commonly-checked per-level fields explicitly. Less common
// fields might need padding during testing if CBK errors.
// ============================================================

@CUSTOMBARNKIT:FINAL
{
    // ============
    // VAB - Vehicle Assembly Building
    // Tighter early part count limits with gradual ramp to stock max.
    // ============
    @VAB
    {
        @levels = 6
        @upgradesVisual = 1, 1, 2, 2, 3, 3
        @upgrades = 15000, 40000, 100000, 250000, 500000, 1000000
        @partCountLimit = 10, 20, 40, 70, 120, 255
    }

    // ============
    // SPH - Spaceplane Hangar
    // Matches VAB exactly.
    // ============
    @SPH
    {
        @levels = 6
        @upgradesVisual = 1, 1, 2, 2, 3, 3
        @upgrades = 15000, 40000, 100000, 250000, 500000, 1000000
        @partCountLimit = 10, 20, 40, 70, 120, 255
    }

    // ============
    // LAUNCHPAD
    // Mass and size scale toward unlimited at level 6.
    // craftSizeLimit uses a sub-block of size = X, Y, Z entries.
    // ============
    @LAUNCHPAD
    {
        @levels = 6
        @upgradesVisual = 1, 1, 2, 2, 3, 3
        @upgrades = 15000, 40000, 100000, 250000, 500000, 1000000
        @craftMassLimit = 18, 35, 70, 150, 300, -1
        !craftSizeLimit {}
        craftSizeLimit
        {
            size = 30, 20, 30
            size = 40, 30, 40
            size = 50, 50, 50
            size = 60, 80, 60
            size = 80, 100, 80
            size = -1, -1, -1
        }
    }

    // ============
    // RUNWAY
    // Same progression as LAUNCHPAD.
    // ============
    @RUNWAY
    {
        @levels = 6
        @upgradesVisual = 1, 1, 2, 2, 3, 3
        @upgrades = 15000, 40000, 100000, 250000, 500000, 1000000
        @craftMassLimit = 18, 35, 70, 150, 300, -1
        !craftSizeLimit {}
        craftSizeLimit
        {
            size = 30, 20, 30
            size = 40, 30, 40
            size = 50, 50, 50
            size = 60, 80, 60
            size = 80, 100, 80
            size = -1, -1, -1
        }
    }

    // ============
    // TRACKING - Tracking Station
    // orbitDisplayMode: 0=none, 1=body orbits, 2=all orbits, 3=patched conics
    // patchesAheadLimit: how many maneuver patches you can plan ahead
    // ============
    @TRACKING
    {
        @levels = 6
        @upgradesVisual = 1, 1, 2, 2, 3, 3
        @upgrades = 20000, 60000, 150000, 350000, 700000, 1500000
        @orbitDisplayMode = 0, 1, 2, 3, 3, 3
        @patchesAheadLimit = 0, 1, 2, 4, 6, 10
    }

    // ============
    // MISSION - Mission Control
    // Active contract slots scale with level. CBK's default config
    // does not expose a "number offered" field, only "active limit".
    // partRecoveryValueFactor = 0 disables fund refunds from craft
    // recovery. Funds in this mod are for building upgrades only.
    // ============
    @MISSION
    {
        @levels = 6
        @upgradesVisual = 1, 1, 2, 2, 3, 3
        @upgrades = 15000, 50000, 120000, 300000, 600000, 1200000
        @activeContractsLimit = 1, 2, 4, 7, 12, -1
        @partRecoveryValueFactor = 0
        @resourceRecoveryValueFactor = 0
    }

    // ============
    // RESEARCH - R&D
    // scienceCostLimit gates the maximum tech tree node science cost
    // the player can unlock at this R&D level.
    // dataToScienceRatio is the conversion when transmitting partial science.
    // unlockedFuelTransfer is the level at which fuel transfer unlocks.
    // ============
    @RESEARCH
    {
        @levels = 6
        @upgradesVisual = 1, 1, 2, 2, 3, 3
        @upgrades = 15000, 40000, 100000, 250000, 500000, 1000000
        @scienceCostLimit = 50, 100, 200, 400, 750, -1
        @dataToScienceRatio = 0.3, 0.4, 0.55, 0.7, 0.85, 1.0
        @unlockedFuelTransfer = 4
    }

    // ============
    // ASTRONAUTS - Astronaut Complex
    // activeCrewLimit: max kerbals you can have employed
    // crewLevelLimit: max experience level a kerbal can reach
    // ============
    @ASTRONAUTS
    {
        @levels = 6
        @upgradesVisual = 1, 1, 2, 2, 3, 3
        @upgrades = 15000, 40000, 100000, 250000, 500000, 1000000
        @activeCrewLimit = 3, 5, 8, 12, 20, -1
        @crewLevelLimit = 1, 2, 3, 4, 5, -1
    }

    // ADMINISTRATION not modified - strategies are disabled in this mod.
    // It uses stock defaults (3 levels).
}
