// ============================================================
// CAREER REIMAGINED - SCIENCE SCALING
// 
// SCIENCE no longer requires any difficulty setting. ScienceGainMultiplier
// can stay at the default 1.0.
// 
// Experiment science is reduced to 50% of stock so that a thorough campaign's
// experiment haul stays meaningful but doesn't trivialize the tech tree.
// Combined with contract science (main missions give little, bonus missions
// give lots), total obtainable science sits a touch above the cost to unlock
// every science node in the tree.
// 
// Stock "World Firsts" science payouts are small (a few hundred over a career)
// and are left at full value - negligible next to the rest of the economy.
// 
// NOTE: FUNDS still require FundsGainMultiplier = 0.1 in difficulty settings,
// because stock World Firsts FUNDS payouts are large and cannot be disabled
// by config. Mission rewardFunds values in the files are 10x to compensate.
// ============================================================

@EXPERIMENT_DEFINITION:FINAL
{
    @baseValue *= 0.5
    @scienceCap *= 0.5
}