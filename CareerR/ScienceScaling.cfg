// ============================================================
// CAREER REIMAGINED - SCIENCE SCALING
// 
// The mod uses:
//   - FundsGainMultiplier = 0.1 in difficulty settings (cuts stock World Firsts funds)
//   - ScienceGainMultiplier = 0.1 in difficulty settings (cuts stock World Firsts science)
// 
// To compensate for SGM = 0.1:
//   - Mission rewardScience values in files are 10x intended (cancelled by SGM=0.1)
//   - Experiment baseValue and scienceCap are scaled 10x by the patch below
//   - dataScale is divided by 10 so transmission data size (in mits) stays at stock value
//     (otherwise antennas would consume 10x electric charge to transmit)
// 
// Net effect:
//   - Stock World Firsts pay 10% of stock science (cut, as intended)
//   - CareerR mission rewards pay intended values (10x file * 0.1 SGM = 1x intended)
//   - Experiments pay intended stock values (10x base * 0.1 SGM = 1x stock)
//   - Antenna EC cost to transmit stays at stock value
// 
// NOTE: If experiment science seems unchanged after editing this file:
//   1. Close KSP
//   2. Delete GameData/ModuleManager.ConfigCache and .ConfigSHA
//   3. Launch KSP - MM will rebuild the cache and apply this patch
// ============================================================

@EXPERIMENT_DEFINITION:FINAL
{
    @baseValue *= 10
    @scienceCap *= 10
    @dataScale *= 0.1
}