// ============================================================
// CAREER REIMAGINED - DISABLE STOCK CONTRACTS
// 
// Disables all stock KSP contract categories. Based on Malah's
// StockNoContracts (2015, public domain) with CometSample added
// for KSP 1.12+ comet contracts.
// 
// NOTE: Stock "World Firsts" milestones (reach 1km, reach space,
// first orbit, etc.) are hardcoded in KSP and fire automatically
// during flight, paying out funds/sci/rep. They cannot be disabled
// via config patches.
// 
// SOLUTION: Set FundsGainMultiplier = 0.1 and ScienceGainMultiplier
// = 0.1 in your save's difficulty settings to neutralize them.
// CareerR's mission rewards have been scaled to compensate.
// ============================================================

@Contracts:FINAL
{
    @Progression
    {
        @DisableTutorialContracts = True
        @DisableProgressionContracts = True
    }
    
    @ARM
    {
        @MaximumAvailable = 0
        @MaximumActive = 0
        @MaximumExistent = 0
        @Rarity = 0
    }
    @Base
    {
        @MaximumAvailable = 0
        @MaximumActive = 0
        @MaximumExistent = 0
        @Rarity = 0
    }
    @Flag
    {
