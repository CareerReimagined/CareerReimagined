CONTRACT_TYPE
{
    name = FP_Aviation_FirstFlight
    title = First Flight - Aviation
    sortKey = 39
    description = Take to the skies and explore Kerbin from above!
    synopsis = Fly a plane and collect biome data around KSC.
    completedMessage = Winged flight achieved. Tech node unlocked.
    group = CareerR_Aviation
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 20.0
    rewardFunds = 325000.0
    rewardReputation = 5.0
    failureFunds = 0
    failureReputation = 0
    advanceFunds = 32500.0
    PARAMETER
    {
        name = ReachAltitudeGroup
        type = VesselParameterGroup
        title = Take flight over Kerbin

        PARAMETER
        {
            name = ReachAltitude
            type = ReachState
            minAltitude = 100
            maxAltitude = 10000
            situation = FLYING
            disableOnStateChange = true
            hideChildren = true
        }
    }
    PARAMETER
    {
        name = CollectScienceAtLeast
        type = AtLeast
        count = 1
        title = Collect biome science data while flying (transmit OR recover)

        PARAMETER
        {
            name = ViaTransmit
            type = CollectScience
            targetBody = Kerbin
            situation = FlyingLow
            recoveryMethod = Transmit
            title = Transmit: Collect biome science data while flying
        }
        PARAMETER
        {
            name = ViaRecover
            type = CollectScience
            targetBody = Kerbin
            situation = FlyingLow
            recoveryMethod = Recover
            title = Recover: Collect biome science data while flying
        }
    }
    PARAMETER
    {
        name = HasJetEngine
        type = PartValidation
        title = Must have an air-breathing jet engine
        part = JetEngine
        part = turboFanEngine
        part = turboFanSize2
        part = miniJetEngine
        part = turboJet
        part = RAPIER
        minCount = 1
    }
    BEHAVIOUR
    {
        name = UnlockParts
        type = UnlockTech
        techID = ml_aviationFirstFlight
    }
    BEHAVIOUR
    {
        name = CompletionDialog
        type = DialogBox

        DIALOG_BOX
        {
            title = Aviation: First Flight!
            condition = CONTRACT_SUCCESS
            position = CENTER

            TEXT
            {
                text = Aviation First Flight complete.\n\nAtmospheric flight of a winged aircraft, achieved.\n\nAviation First Flight tech node unlocked.
            }
        }
    }
}

