CONTRACT_TYPE
{
    name = FP_Bonus_DunaPlane
    title = Duna Aviator
    sortKey = 40
    description = Fly an aircraft in Duna's atmosphere! Duna's air is thin and has no oxygen, so jet engines will not work there - bring wings and propeller or rocket propulsion. Get a winged craft flying in the Duna skies.
    synopsis = Fly a winged aircraft in Duna's atmosphere.
    completedMessage = Aircraft flown on Duna.
    group = CareerR_Bonus_Duna
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 98.0
    rewardFunds = 500000.0
    rewardReputation = 16.0
    failureFunds = 0
    failureReputation = 0
    advanceFunds = 50000.0
    REQUIREMENT
    {
        name = CompleteFP_DunaReconnaissance
        type = CompleteContract
        contractType = FP_DunaReconnaissance
    }
    REQUIREMENT
    {
        // Gate the offer behind having propulsion suitable for a Duna
        // plane. PartUnlocked is satisfied if ANY listed part is unlocked.
        // Duna's atmosphere has no oxygen, so jets/intakes are useless
        // there - this lists rocket engines light enough for an aircraft
        // (the aerospike plus the small rocket engines), NOT jets. Most of
        // these unlock before Duna is even reachable, so in practice this
        // just makes the "rocket-plane propulsion" intent explicit rather
        // than delaying the contract past the Reconnaissance gate above.
        name = PlaneEngineUnlocked
        type = PartUnlocked
        part = toroidalAerospike
        part = liquidEngineMini
        part = radialEngineMini_v2
        part = microEngine
        part = radialLiquidEngine1-2
        part = smallRadialEngine
    }
    PARAMETER
    {
        name = DunaFlightGroup
        type = VesselParameterGroup
        title = Fly a winged aircraft in Duna's atmosphere
        // Requires control surfaces (wings/elevons carry the
        // ModuleControlSurface module) AND the FLYING situation at Duna,
        // on the same vessel - i.e. an actual aircraft in flight, not a
        // suborbital lander passing through the atmosphere.
        PARAMETER
        {
            name = HasWings
            type = PartValidation
            partModule = ModuleControlSurface
            minCount = 1
            title = Vessel must have wings or control surfaces
            hideChildren = true
        }
        PARAMETER
        {
            name = FlyingAtDuna
            type = ReachState
            targetBody = Duna
            situation = FLYING
            disableOnStateChange = true
            title = Be in flight in Duna's atmosphere
            hideChildren = true
        }
    }
}

