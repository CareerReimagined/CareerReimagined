CONTRACT_TYPE
{
    name = FP_Bonus_MunRover
    title = Munar Rover Expedition
    sortKey = 31
    description = Drive a wheeled rover across the surface of the Mun. Get your rover moving at 5 m/s or faster while on the ground.
    synopsis = Reach 5 m/s on the Mun's surface in a wheeled rover.
    completedMessage = Mun rover record set.
    group = CareerR_Bonus_Mun
    agent = Experimental Engineering Group
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 0.0
    rewardFunds = 225000.0
    rewardReputation = 12.0
    failureFunds = 0
    failureReputation = 0
    advanceFunds = 22500.0
    PARAMETER
    {
        name = RoverGroup
        type = VesselParameterGroup
        title = Drive a wheeled rover at 5 m/s on the Mun
        // disableOnStateChange defaults to TRUE, which is what we want:
        // it requires the child parameters to be satisfied CURRENTLY and
        // SIMULTANEOUSLY (per nightingale - true means "must be doing it
        // now", false means "did it at some point", which would latch and
        // let the contract complete later, even in orbit). We leave it at
        // the default and additionally cap speed below, so the only way to
        // satisfy this is a rover physically driving on the surface.

        PARAMETER
        {
            name = HasWheels
            type = PartValidation
            partModule = ModuleWheelBase
            minCount = 1
            title = Vessel must have wheels
            hideChildren = true
        }
        PARAMETER
        {
            name = DrivingOnMun
            type = ReachState
            targetBody = Mun
            situation = LANDED
            minSpeed = 5
            // maxSpeed ceiling excludes orbital velocity outright: a
            // landed rover tops out well under 100 m/s, while any Mun
            // orbit is ~500+ m/s. This is the real fix for the
            // "completed in orbit" bug - even if a LANDED reading ever
            // coincides with high speed, 100 m/s caps it out.
            maxSpeed = 100
            title = Reach 5 m/s while driving on the Mun's surface
            hideChildren = true
        }
    }
}

