// FIRST FLIGHT BONUS MISSIONS
CONTRACT_TYPE
{
    name = FP_Bonus_Grasslands
    title = Bonus: Grasslands Data
    sortKey = 02
    description = Collect science data from the Grasslands biome.
    synopsis = Collect and either transmit or recover science from the Grasslands.
    completedMessage = Grasslands data collected! Bonus science awarded!
    group = CareerR_Kerbin
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 20.0
    rewardFunds = 5000.0
    rewardReputation = 2.0
    advanceFunds = 500.0
    REQUIREMENT
    {
        name = CompleteFP_FirstFlight
        type = CompleteContract
        contractType = FP_FirstFlight
    }
    PARAMETER
    {
        name = CollectScienceAtLeast
        type = AtLeast
        count = 1
        title = Collect science data from the Grasslands (transmit OR recover)

        PARAMETER
        {
            name = ViaTransmit
            type = CollectScience
            targetBody = Kerbin
            biome = Grasslands
            recoveryMethod = Transmit
            title = Transmit: Collect science data from the Grasslands
        }
        PARAMETER
        {
            name = ViaRecover
            type = CollectScience
            targetBody = Kerbin
            biome = Grasslands
            recoveryMethod = Recover
            title = Recover: Collect science data from the Grasslands
        }
    }
}

