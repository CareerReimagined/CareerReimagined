// ============================================================
// CAREER REIMAGINED - FREE PARTS
// Zeroes out cost (per-part purchase price) and entryCost
// (one-time VAB unlock fee) for every part in the game.
// Funds are reserved for building upgrades only.
// ============================================================

@PART[*]:FINAL
{
    @cost = 0
    @entryCost = 0
}

// ============================================================
// FREE RESOURCES
// Zeroes out unitCost for all fuels and propellants so resource
// fill at launch doesn't cost funds. This also means no refund
// when recovering full tanks.
// ============================================================

@RESOURCE_DEFINITION[*]:FINAL
{
    @unitCost = 0
}