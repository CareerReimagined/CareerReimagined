// ============================================================
// CAREER REIMAGINED - BUILDING LIMITS
// Requires Custom Barn Kit by Sarbian.
// Tightens VAB and SPH part count limits to push progression.
// Uses @ patch syntax so Custom Barn Kit's stock defaults for
// all other buildings (especially TRACKING / DSN range) are
// preserved. Defining a bare CUSTOMBARNKIT block instead of
// patching will zero out the unspecified buildings and
// break CommNet.
// ============================================================

@CUSTOMBARNKIT:FINAL
{
    @VAB
    {
        @partCountLimit = 15, 45, 120
    }
    @SPH
    {
        @partCountLimit = 15, 45, 120
    }
}