CONTRACT_TYPE
{
    name = FP_FirstFlight
    title = First Flight
    sortKey = 01
    description = Launch your first rocket and reach the lower atmosphere.
    synopsis = Reach between 1km and 18km altitude to prove your rocket works.
    completedMessage = First flight achieved. Tech node unlocked.
    group = CareerR_Kerbin
    agent = Kerlington Model Rockets and Paper Products Inc
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 12.0
    rewardFunds = 113750
    rewardReputation = 5.0
    failureFunds = 0
    failureReputation = 0
    advanceFunds = 11375
