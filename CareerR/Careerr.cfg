// ============================================================
// CAREER REIMAGINED - MOD IDENTITY DECLARATION
//
// Declares the "CareerR" ModuleManager flag so that every
// :NEEDS[CareerR] / :AFTER[CareerR] patch in this mod applies,
// regardless of the GameData folder name and without a plugin.
//
// ModuleManager harvests every :FOR[modname] tag during its initial
// scan and adds it to the list of "loaded mods". Per the MM docs,
// "a FOR[Blah] defined would allow NEEDS[Blah]". That registration
// is what makes :NEEDS[CareerR] / :AFTER[CareerR] resolve everywhere.
//
// IMPORTANT: the :FOR[] tag must live on a PATCH (a node prefixed
// with @, !, +, etc. that edits existing nodes), NOT on a bare node
// definition. Below is a no-op edit of every PART with an empty
// body: it matches parts that exist in every install and changes
// nothing. Its only effect is to register the CareerR flag.
//
// Do not delete this file. It is what tells ModuleManager that
// CareerR is installed.
// ============================================================

@PART[*]:FOR[CareerR] {}