// ============================================================
// CAREER REIMAGINED - KSP COMMUNITY FIXES COMPATIBILITY
// 
// KSP Community Fixes has a "RefundingOnRecovery" feature that
// properly accounts for IPartCostModifier modules during craft
// recovery. While useful in vanilla, it bypasses our mod's
// "funds-for-buildings-only" economy by paying out large refunds
// when craft are recovered.
// 
// We disable this one KSPCF feature so recovery refunds don't
// inflate the player's funds. All other KSPCF features remain active.
// 
// Syntax matches the official override pattern from
// KSPCF/Extras/KSPCF_UserSettings.cfg.extra
// ============================================================

@KSP_COMMUNITY_FIXES:AFTER[KSPCommunityFixes]
{
    @RefundingOnRecovery = false
}