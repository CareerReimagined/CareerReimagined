CONTRACT_TYPE
{
    name = FP_FirstFlight
    title = First Flight
    sortKey = 01
    description = Launch your first rocket and reach the lower atmosphere.
    synopsis = Reach between 1km and 18km altitude to prove your rocket works.
    completedMessage = Welcome to the space program! Early Rocketry is now unlocked.
    group = CareerR
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 10.0
    rewardFunds = 10000.0
    rewardReputation = 5.0
    advanceFunds = 1000.0
    PARAMETER
    {
        name = ReachAltitudeGroup
        type = VesselParameterGroup
        title = Reach between 1km and 18km altitude

        PARAMETER
        {
            name = ReachAltitude
            type = ReachState
            minAltitude = 1000
            maxAltitude = 18000
            disableOnStateChange = true
            hideChildren = true
        }
    }
    BEHAVIOUR
    {
        name = UnlockParts
        type = UnlockTech
        techID = ml_firstFlight
    }
}


CONTRACT_TYPE
{
    name = FP_EarlyRocketry
    title = Early Rocketry
    sortKey = 05
    description = Push higher and collect data in the upper atmosphere.
    synopsis = Reach between 18km and 45km and collect science data.
    completedMessage = Upper Atmosphere unlocked! The Hammer booster is yours.
    group = CareerR
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 15.0
    rewardFunds = 15000.0
    rewardReputation = 8.0
    advanceFunds = 2000.0
    REQUIREMENT
    {
        name = CompleteFP_FirstFlight
        type = CompleteContract
        contractType = FP_FirstFlight
        minCount = 1
    }
    PARAMETER
    {
        name = ReachAltitudeGroup
        type = VesselParameterGroup
        title = Reach between 18km and 45km altitude

        PARAMETER
        {
            name = ReachAltitude
            type = ReachState
            minAltitude = 18000
            maxAltitude = 45000
            disableOnStateChange = true
            hideChildren = true
        }
    }
    PARAMETER
    {
        name = CollectScienceAtLeast
        type = AtLeast
        count = 1
        title = Collect science data (transmit OR recover)

        PARAMETER
        {
            name = ViaTransmit
            type = CollectScience
            targetBody = Kerbin
            situation = FlyingHigh
            recoveryMethod = Transmit
            title = Transmit science from upper atmosphere
        }
        PARAMETER
        {
            name = ViaRecover
            type = CollectScience
            targetBody = Kerbin
            situation = FlyingHigh
            recoveryMethod = Recover
            title = Recover science from upper atmosphere
        }
    }
    BEHAVIOUR
    {
    name = UnlockParts
    type = UnlockTech
    techID = ml_earlyRocketry
    }
}

    
