CONTRACT_TYPE
{
    name = FP_FirstFlight
    title = First Flight
    sortKey = 01
    description = Launch your first rocket and reach the lower atmosphere.
    synopsis = Reach between 1km and 18km altitude to prove your rocket works.
    completedMessage = Welcome to the space program! Early Rocketry is now unlocked.
    group = CareerR_Kerbin
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 10.0
    rewardFunds = 10000.0
    rewardReputation = 5.0
    advanceFunds = 1000.0
    PARAMETER
    {
        name = ReachAltitudeGroup
        type = VesselParameterGroup
        title = Reach between 1km and 18km altitude

        PARAMETER
        {
            name = ReachAltitude
            type = ReachState
            minAltitude = 1000
            maxAltitude = 18000
            disableOnStateChange = true
            hideChildren = true
        }
    }
    BEHAVIOUR
    {
        name = UnlockParts
        type = UnlockTech
        techID = ml_firstFlight
    }
}


CONTRACT_TYPE
