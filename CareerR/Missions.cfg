CONTRACT_TYPE
{
    name = FP_FirstFlight
    title = First Flight
    sortKey = 01
    description = Launch your first rocket and reach the lower atmosphere.
    synopsis = Reach between 1km and 18km altitude to prove your rocket works.
    completedMessage = Welcome to the space program! Early Rocketry is now unlocked.
    group = CareerR_Kerbin
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 10.0
    rewardFunds = 10000.0
    rewardReputation = 5.0
    advanceFunds = 1000.0
    PARAMETER
    {
        name = ReachAltitudeGroup
        type = VesselParameterGroup
        title = Reach between 1km and 18km altitude

        PARAMETER
        {
            name = ReachAltitude
            type = ReachState
            minAltitude = 1000
            maxAltitude = 18000
            disableOnStateChange = true
            hideChildren = true
        }
    }
    BEHAVIOUR
    {
        name = UnlockParts
        type = UnlockTech
        techID = ml_firstFlight
    }
    BEHAVIOUR
    {
        name = CompletionDialog
        type = DialogBox

        DIALOG_BOX
        {
            title = First Flight Complete!
            condition = CONTRACT_SUCCESS
            position = CENTER

            TEXT
            {
                text = Congratulations on your first flight!\n\nNew parts unlocked:\n• Probodobodyne OKTO probe core\n• RT-10 "Hammer" SRB\n• PresMat Barometer\n• Z-100 Battery Pack
            }
        }
    }
}


CONTRACT_TYPE
{
    name = FP_EarlyRocketry
    title = Reach 18km
    sortKey = 05
    description = Push your rocket past the lower atmosphere and into the upper atmosphere.
    synopsis = Reach between 18km and 45km altitude and collect science data.
    completedMessage = Reliant engine, basic fuel tanks, and inline reaction wheel unlocked!
    group = CareerR_Kerbin
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 15.0
    rewardFunds = 15000.0
    rewardReputation = 8.0
    advanceFunds = 2000.0
    REQUIREMENT
    {
        name = CompleteFP_FirstFlight
        type = CompleteContract
        contractType = FP_FirstFlight
        minCount = 1
    }
    PARAMETER
    {
        name = ReachAltitudeGroup
        type = VesselParameterGroup
        title = Reach between 18km and 45km altitude

        PARAMETER
        {
            name = ReachAltitude
            type = ReachState
            minAltitude = 18000
            maxAltitude = 45000
            disableOnStateChange = true
            hideChildren = true
        }
    }
    PARAMETER
    {
        name = CollectScienceAtLeast
        type = AtLeast
        count = 1
        title = Collect science data (transmit OR recover)

        PARAMETER
        {
            name = ViaTransmit
            type = CollectScience
            targetBody = Kerbin
            situation = FlyingHigh
            recoveryMethod = Transmit
            title = Transmit science from upper atmosphere
        }
        PARAMETER
        {
            name = ViaRecover
            type = CollectScience
            targetBody = Kerbin
            situation = FlyingHigh
            recoveryMethod = Recover
            title = Recover science from upper atmosphere
        }
    }
    BEHAVIOUR
    {
    name = UnlockParts
    type = UnlockTech
    techID = ml_earlyRocketry
    }
    BEHAVIOUR
    {
        name = CompletionDialog
        type = DialogBox

        DIALOG_BOX
        {
            title = Early Rocketry Complete!
            condition = CONTRACT_SUCCESS
            position = CENTER

            TEXT
            {
                text = You've broken into early rocketry!\n\nNew parts unlocked:\n• Advanced Inline Stabilizer\n• Restock radial reaction wheel\n• LV-T30 "Reliant"\n• Oscar-B Fuel Tank\n• FL-T100 Fuel Tank\n• FL-T200 Fuel Tank\n• TT-38K Radial Decoupler\n• TR-2C Stack Decoupler (0.625m)\n• TR-18A Stack Decoupler (1.25m)\n• TS-06 Stack Separator (0.625m)\n• TS-12 Stack Separator (1.25m)\n• Small engine plate\n• Sepratron I\n• Restock tiny radial decoupler
            }
        }
    }
}

    
