    title = Reach Eve's Sphere of Influence
    sortKey = 62
    description = Send an unmanned probe to Eve and enter its gravitational influence.
    synopsis = Send an unmanned probe to enter Eve's sphere of influence and collect science data.
    completedMessage = Mainsail engine unlocked!
    group = CareerR_Eve
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 110.0
    rewardFunds = 220000.0
    rewardReputation = 65.0
    advanceFunds = 22000.0
    REQUIREMENT
    {
        name = CompleteFP_LeaveKerbinSOI
        type = CompleteContract
        contractType = FP_LeaveKerbinSOI
    }
    PARAMETER
    {
        name = ReachEveSOIGroup
        type = VesselParameterGroup
        title = Enter Eve's sphere of influence

        PARAMETER
        {
            name = ReachEveSOI
            type = ReachState
            targetBody = Eve
            disableOnStateChange = true
            hideChildren = true
        }
    }
    PARAMETER
    {
        name = Unmanned
        type = VesselIsType
        vesselType = Probe
        title = Vessel must be unmanned
    }
    PARAMETER
    {
        name = CollectScienceAtLeast
        type = AtLeast
        count = 1
        title = Collect science data near Eve (transmit OR recover)

        PARAMETER
        {
            name = ViaTransmit
            type = CollectScience
            targetBody = Eve
            situation = InSpaceLow
            recoveryMethod = Transmit
            title = Transmit: Collect science data near Eve
        }
        PARAMETER
        {
            name = ViaRecover
            type = CollectScience
            targetBody = Eve
            situation = InSpaceLow
            recoveryMethod = Recover
            title = Recover: Collect science data near Eve
        }
        PARAMETER
        {
            name = ViaTransmitHigh
            type = CollectScience
            targetBody = Eve
            situation = InSpaceHigh
            recoveryMethod = Transmit
            title = Transmit: Collect science data near Eve (high)
        }
        PARAMETER
        {
            name = ViaRecoverHigh
            type = CollectScience
            targetBody = Eve
            situation = InSpaceHigh
            recoveryMethod = Recover
            title = Recover: Collect science data near Eve (high)
        }
    }
    BEHAVIOUR
    {
        name = UnlockParts
        type = UnlockTech
        techID = ml_eveOrbitProbe
    }
}

CONTRACT_TYPE
{
    name = FP_EveSatellite
    title = Eve Satellite
    sortKey = 64
    description = Place a self-sustaining satellite in orbit around Eve and transmit science data back to Kerbin.
    synopsis = Orbit Eve with solar panels, battery, and antenna, then transmit science.
    completedMessage = New parts unlocked!
    group = CareerR_Eve
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 120.0
    rewardFunds = 200000.0
    rewardReputation = 60.0
    advanceFunds = 20000.0
    REQUIREMENT
    {
        name = CompleteFP_EveOrbitProbe
        type = CompleteContract
        contractType = FP_EveOrbitProbe
    }
    PARAMETER
    {
        name = EveSatelliteVesselGroup
        type = VesselParameterGroup
        title = Solar panel + battery + antenna onboard, in orbit around Eve

        PARAMETER
        {
            name = OrbitEve
            type = ReachState
            targetBody = Eve
            situation = ORBITING
            disableOnStateChange = true
            hideChildren = true
        }
        PARAMETER
        {
            name = HasSolarPanel
            type = PartValidation
            partModule = ModuleDeployableSolarPanel
            minCount = 1
            title = Has at least one deployable solar panel
            hideChildren = true
        }
        PARAMETER
        {
            name = HasBattery
            type = HasResource
            resource = ElectricCharge
            minQuantity = 1
            title = Has battery storage
            hideChildren = true
        }
        PARAMETER
        {
            name = HasAntennaParam
            type = HasAntenna
            minAntennaPower = 500000
            title = Has at least one antenna (500k+ range)
            hideChildren = true
        }
    }
    PARAMETER
    {
        name = TransmitFromEveOrbit
        type = AtLeast
        count = 1
        title = Transmit science from Eve orbit

        PARAMETER
        {
            name = TransmitLow
            type = CollectScience
            targetBody = Eve
            situation = InSpaceLow
            recoveryMethod = Transmit
            title = Transmit science from low Eve orbit
        }
        PARAMETER
        {
            name = TransmitHigh
            type = CollectScience
            targetBody = Eve
            situation = InSpaceHigh
            recoveryMethod = Transmit
            title = Transmit science from high Eve orbit
        }
    }
    BEHAVIOUR
    {
        name = UnlockParts
        type = UnlockTech
        techID = ml_eveSatellite
    }
}

