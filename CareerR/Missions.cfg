CONTRACT_TYPE
{
    name = FP_FirstFlight
    title = First Flight
    sortKey = 01
    description = Launch your first rocket and reach the lower atmosphere.\n\nUnlocks: Probodobodyne OKTO, RT-10 "Hammer" SRB, PresMat Barometer, Z-100 Battery
    synopsis = Reach between 1km and 18km altitude to prove your rocket works.
    completedMessage = Welcome to the space program! Early Rocketry is now unlocked.
    group = CareerR_Kerbin
    maxSimultaneous = 1
    maxCompletions = 1
    rewardScience = 100.0
    rewardFunds = 50000.0
    rewardReputation = 5.0
    advanceFunds = 5000.0
    PARAMETER
    {
        name = ReachAltitudeGroup
        type = VesselParameterGroup
        title = Reach between 1km and 18km altitude

        PARAMETER
        {
            name = ReachAltitude
            type = ReachState
            minAltitude = 1000
            maxAltitude = 18000
            disableOnStateChange = true
            hideChildren = true
        }
    }
    BEHAVIOUR
    {
        name = UnlockParts
        type = UnlockTech
        techID = ml_firstFlight
    }
    BEHAVIOUR
    {
        name = CompletionDialog
        type = DialogBox

        DIALOG_BOX
        {
            title = First Flight Complete!
            condition = CONTRACT_SUCCESS
            position = CENTER

            TEXT
            {
                text = Congratulations on your first flight!\n\nNew parts unlocked:\n• Probodobodyne OKTO\n• RT-10 "Hammer" SRB\n• PresMat Barometer\n• Z-100 Battery
            }
        }
    }
}


CONTRACT_TYPE
