// ============================================================
// CAREER REIMAGINED - CONTRACT GROUP DEFINITIONS
//
// Groups are flat (this Contract Configurator version does not
// support the 'parent' nesting attribute). Each group is
// distinguished by its displayName in Mission Control:
//   - Kerbin Program: atmospheric flight, orbit, reentry, satellite,
//             rendezvous, docking
//   - Mun / Minmus Program: their respective chains
//   - Interplanetary Program: Leave Kerbin SOI (interplanetary gate)
//   - Duna / Eve Program: planet + moon chains
//   - Aviation Program: aviation milestones
//   - <Body> (Bonus): optional bonus contracts per body
// ============================================================

