// ============================================================
// AGENCY BRANDING (cosmetic)
//
// Assigns a Mission Control sponsor (logo + name) per group via
// additive @CONTRACT_GROUP patches. The 'agent' field matches the
// AGENT *name* field in Squad/Agencies/Agencies.cfg (NOT the title,
// which is a #autoLOC localization token). Precedence per CC docs:
// contract-level agent -> group agent -> random.
//
// Strings below are copied verbatim from the stock AGENT name fields.
// Purely cosmetic: no effect on rewards or completion logic.
// ============================================================

// --- Main milestone / conquest path -> World-Firsts Record-Keeping Society
@CONTRACT_GROUP[CareerR]        { agent = Kerbin World-Firsts Record-Keeping Society }
@CONTRACT_GROUP[CareerR_Kerbin] { agent = Kerbin World-Firsts Record-Keeping Society }
@CONTRACT_GROUP[CareerR_Mun]    { agent = Kerbin World-Firsts Record-Keeping Society }
@CONTRACT_GROUP[CareerR_Minmus] { agent = Kerbin World-Firsts Record-Keeping Society }
@CONTRACT_GROUP[CareerR_Sol]    { agent = Kerbin World-Firsts Record-Keeping Society }
@CONTRACT_GROUP[CareerR_Duna]   { agent = Kerbin World-Firsts Record-Keeping Society }
@CONTRACT_GROUP[CareerR_Eve]    { agent = Kerbin World-Firsts Record-Keeping Society }
@CONTRACT_GROUP[CareerR_Moho]   { agent = Kerbin World-Firsts Record-Keeping Society }
@CONTRACT_GROUP[CareerR_Dres]   { agent = Kerbin World-Firsts Record-Keeping Society }
@CONTRACT_GROUP[CareerR_Jool]   { agent = Kerbin World-Firsts Record-Keeping Society }
@CONTRACT_GROUP[CareerR_Eeloo]  { agent = Kerbin World-Firsts Record-Keeping Society }

// --- Aviation -> C7 Aerospace Division (stock spaceplane-parts maker)
@CONTRACT_GROUP[CareerR_Aviation] { agent = C7 Aerospace Division }

// --- Bonus tabs: group default is the science sponsor (R&D Department).
//     Individual FEAT contracts (challenges, recoveries, EVAs, flags,
//     stations, rover, long-duration, crater) override to Experimental
//     Engineering Group at the contract level in BonusMissions.cfg.
@CONTRACT_GROUP[CareerR_Bonus_Kerbin] { agent = Research & Development Department }
@CONTRACT_GROUP[CareerR_Bonus_Mun]    { agent = Research & Development Department }
@CONTRACT_GROUP[CareerR_Bonus_Minmus] { agent = Research & Development Department }

// Duna/Eve bonus tabs: these contain feat-style challenges (a Duna
// flight, an Eve sample return), so Experimental Engineering Group
// fits better than the R&D science sponsor used by the inner tabs.
@CONTRACT_GROUP[CareerR_Bonus_Duna] { agent = Experimental Engineering Group }
@CONTRACT_GROUP[CareerR_Bonus_Eve]  { agent = Experimental Engineering Group }

// Aviation bonus feats keep the aviation theme (C7 Aerospace, the stock
// spaceplane-parts maker) to match the main Aviation Program tab.
@CONTRACT_GROUP[CareerR_Bonus_Aviation] { agent = C7 Aerospace Division }