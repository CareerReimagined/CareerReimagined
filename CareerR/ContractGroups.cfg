// ============================================================
// CAREER REIMAGINED - CONTRACT GROUP DEFINITIONS
// Parent group: CareerR
// Sub-groups (rocketry split by destination):
//   - Kerbin: atmospheric flight, orbit, reentry, satellite,
//             rendezvous, docking, plus Kerbin bonus missions
//   - Mun: Mun chain + Mun bonuses
//   - Minmus: Minmus chain + Minmus bonuses
//   - Sol: Leave Kerbin SOI (interplanetary gate)
//   - Duna: Duna + Ike chain
//   - Eve: Eve + Gilly chain
//   - Aviation: aviation milestones + aviation bonuses
// Bonus missions live within their destination group, marked with
// "Bonus:" title prefix for visual distinction in mission control.
// ============================================================

