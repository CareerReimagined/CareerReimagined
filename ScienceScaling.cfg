// ============================================================
// CAREER REIMAGINED - SCIENCE SCALING
// Reduces science from experiments to 10% of stock values.
// Missions (main + bonus) are the intended primary science
// source. Experiments remain rewarding for discovery but
// can't substitute for completing missions.
// ============================================================

@EXPERIMENT_DEFINITION[*]:FINAL
{
    @baseValue *= 0.1
    @scienceCap *= 0.1
}
